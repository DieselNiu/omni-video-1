  <rect x="96" y="566" width="1008" height="42" rx="21" fill="#e8edf5"/>
  <text x="134" y="594" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">If your monthly credits run out twice, move up a plan before buying packs repeatedly.</text>
