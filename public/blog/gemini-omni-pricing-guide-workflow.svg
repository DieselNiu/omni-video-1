<svg width="1200" height="675" viewBox="0 0 1200 675" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="675" fill="#fbfaf7"/>
  <text x="90" y="88" fill="#161616" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="800">How to read Gemini Omni pricing</text>
  <text x="90" y="128" fill="#66615a" font-family="Inter, Arial, sans-serif" font-size="21">Start with the job you need to do, then match credits and billing cadence.</text>
  <g stroke="#d9d1c2" stroke-width="3" fill="#ffffff">
    <rect x="92" y="190" width="238" height="300" rx="22"/>
    <rect x="362" y="190" width="238" height="300" rx="22"/>
    <rect x="632" y="190" width="238" height="300" rx="22"/>
    <rect x="902" y="190" width="238" height="300" rx="22"/>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <text x="124" y="242" fill="#111111" font-size="27" font-weight="800">1. Workflow</text>
    <text x="124" y="292" fill="#55504a" font-size="19">Test ideas</text>
    <text x="124" y="326" fill="#55504a" font-size="19">Make clips weekly</text>
    <text x="124" y="360" fill="#55504a" font-size="19">Batch campaigns</text>
    <text x="124" y="394" fill="#55504a" font-size="19">Team production</text>
    <text x="394" y="242" fill="#111111" font-size="27" font-weight="800">2. Credits</text>
    <text x="394" y="292" fill="#55504a" font-size="19">Images use fewer</text>
    <text x="394" y="326" fill="#55504a" font-size="19">Video uses more</text>
    <text x="394" y="360" fill="#55504a" font-size="19">Packs add buffer</text>
    <text x="394" y="394" fill="#55504a" font-size="19">Track monthly pace</text>
    <text x="664" y="242" fill="#111111" font-size="27" font-weight="800">3. Plan</text>
    <text x="664" y="292" fill="#55504a" font-size="19">Free for trial</text>
    <text x="664" y="326" fill="#55504a" font-size="19">Lite for light use</text>
    <text x="664" y="360" fill="#55504a" font-size="19">Pro for steady use</text>
    <text x="664" y="394" fill="#55504a" font-size="19">Premium for volume</text>
    <text x="934" y="242" fill="#111111" font-size="27" font-weight="800">4. Billing</text>
    <text x="934" y="292" fill="#55504a" font-size="19">Monthly to test</text>
    <text x="934" y="326" fill="#55504a" font-size="19">Yearly to save</text>
    <text x="934" y="360" fill="#55504a" font-size="19">Credit packs once</text>
    <text x="934" y="394" fill="#55504a" font-size="19">Upgrade when stable</text>
  </g>
  <g stroke="#9b9284" stroke-width="4" stroke-linecap="round">
    <path d="M330 340h32"/>
    <path d="M600 340h32"/>
    <path d="M870 340h32"/>
  </g>
  <g fill="#9b9284">
    <path d="M360 330l18 10-18 10v-20z"/>
    <path d="M630 330l18 10-18 10v-20z"/>
    <path d="M900 330l18 10-18 10v-20z"/>
  </g>
  <rect x="90" y="540" width="1050" height="60" rx="18" fill="#f0ece4"/>
  <text x="126" y="578" fill="#514a42" font-family="Inter, Arial, sans-serif" font-size="21">The cheapest plan is not always the best plan; the right plan is the one that matches your repeatable output volume.</text>
</svg>
